<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Fortress HSS</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d; --bg-bar: #111111; --bg-status: #0a0a0a;
    --bg-guide: #0f0f0f; --border: #222222; --border-input: #2a2a2a;
    --border-focus: #555555; --text: #c8c8c8; --text-label: #666666;
    --text-input: #e0e0e0; --text-status: #444444; --text-ok: #5a8a5a;
    --text-err: #8a4a4a; --text-overlay: #888888; --btn-border: #444444;
    --btn-text: #dddddd; --btn-hover: #1a1a1a; --btn-active: #222222;
    --g-head: #888888; --g-text: #555555; --g-sep: #1e1e1e;
    --g-tag-bg: #1a1a1a; --g-tag: #666666; --ty-color: #666666;
    --ty-border: #1e1e1e; --canvas-bg: #0d0d0d; --grid-chunk: #1a1a1a;
    --grid-region: #262626; --axis: #2a2a2a;
    --select: #f0b24a; --toggle-on: #49907b;
    --ruler-size: 24;
    --toolbar-gap: 12px;
    --toolbar-px: 16px;
    --btn-size: 30px;
  }

  [data-theme="light"] {
    --bg: #f2f1ec; --bg-bar: #eae9e2; --bg-status: #e4e3dc;
    --bg-guide: #eae9e2; --border: #d0cfc7; --border-input: #c8c7bf;
    --border-focus: #999990; --text: #2c2c28; --text-label: #888880;
    --text-input: #1a1a17; --text-status: #888880; --text-ok: #3a6a3a;
    --text-err: #8a3a3a; --text-overlay: #aaa9a0; --btn-border: #b0afa8;
    --btn-text: #333330; --btn-hover: #ddddd6; --btn-active: #d0cfc8;
    --g-head: #555550; --g-text: #888880; --g-sep: #d0cfc7;
    --g-tag-bg: #ddddd6; --g-tag: #888880; --ty-color: #aaa9a0;
    --ty-border: #d8d7cf; --canvas-bg: #f2f1ec; --toggle-on: #2f806d;
  }

  body {
    background: var(--bg); color: var(--text);
    font-family: 'Courier New', monospace; font-size: 13px;
    display: flex; flex-direction: column; height: 100dvh;
    overflow: hidden; transition: background 0.15s, color 0.15s;
  }

  #toolbar {
    display: flex; align-items: center; gap: var(--toolbar-gap);
    padding: var(--toolbar-px);
    padding-top: calc(var(--toolbar-px) + env(safe-area-inset-top, 0px));
    padding-left: calc(var(--toolbar-px) + env(safe-area-inset-left, 0px));
    background: var(--bg-bar);
    border-bottom: 1px solid var(--border); flex-wrap: wrap;
    flex-shrink: 0; transition: background 0.15s;
  }

  #toolbar label {
    display: flex; flex-direction: column; gap: 2px;
    color: var(--text-label); font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.05em;
  }

  #toolbar input, #toolbar select {
    background: var(--bg); border: 1px solid var(--border-input);
    color: var(--text-input); font-family: inherit; font-size: 13px;
    padding: 4px 6px; width: 110px; outline: none;
    transition: border-color 0.15s, background 0.15s, color 0.15s;
  }

  #toolbar input:focus, #toolbar select:focus { border-color: var(--border-focus); }
  #toolbar select { width: 90px; }

  button {
    background: var(--bg-bar);
    border: 1px solid var(--btn-border);
    color: var(--btn-text);
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
    padding: 5px 9px;
    opacity: 0.75;
    transition: all 0.15s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: var(--btn-size);
    height: var(--btn-size);
    white-space: nowrap;
    border-radius: 2px;
    -webkit-tap-highlight-color: transparent;
  }

  button:hover:not(:disabled) {
    background: var(--btn-hover);
    border-color: var(--border-focus);
    opacity: 1;
    color: var(--text-input);
  }

  button:active:not(:disabled) {
    background: var(--btn-active);
    transform: translateY(1px);
  }

  button:disabled { opacity: 0.3; cursor: default; }

  .btn-icon {
    width: var(--btn-size);
    height: var(--btn-size);
    padding: 0;
  }

  #download { margin-left: auto; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; padding: 0 12px; }

  #status {
    padding: 4px var(--toolbar-px);
    padding-left: calc(var(--toolbar-px) + env(safe-area-inset-left, 0px));
    font-size: 11px; color: var(--text-status);
    background: var(--bg-status); border-bottom: 1px solid var(--border);
    min-height: 22px; letter-spacing: 0.03em;
    flex-shrink: 0; transition: background 0.15s;
  }

  #status.ok  { color: var(--text-ok); }
  #status.err { color: var(--text-err); }

  #main { flex: 1; display: flex; overflow: hidden; }

  #viewport {
    flex: 1; position: relative; overflow: hidden; cursor: crosshair;
    touch-action: none;
  }

  canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }

  #coords {
    position: absolute;
    top: 30px;
    right: 14px;
    font-size: 11px; color: var(--text-overlay);
    pointer-events: none; letter-spacing: 0.05em;
    background: rgba(0, 0, 0, 0.5); padding: 4px 8px; border-radius: 3px;
  }

  #legend {
    position: absolute; bottom: 10px;
    right: 14px;
    font-size: 11px; color: var(--text-overlay);
    pointer-events: none; line-height: 1.8;
    background: rgba(0, 0, 0, 0.5); padding: 6px 8px; border-radius: 3px;
    max-width: calc(100vw - var(--ruler-size) - 80px);
    overflow: hidden; text-overflow: ellipsis;
  }

  #legend span {
    display: inline-block; width: 10px; height: 10px;
    margin-right: 6px; vertical-align: middle;
    flex-shrink: 0;
  }

  #goto-panel {
    position: fixed; top: 0; left: 0; z-index: 1000;
    background: var(--bg-bar); border: 1px solid var(--border);
    padding: 14px 16px 12px; display: flex; flex-direction: column; gap: 10px;
    min-width: 280px; max-width: calc(100vw - 16px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.35);
    transition: background 0.15s;
  }

  #goto-panel[hidden] { display: none !important; }

  .goto-row { display: flex; gap: 10px; align-items: flex-end; }

  .goto-label {
    display: flex; flex-direction: column; gap: 3px;
    color: var(--text-label); font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.05em;
    flex: 1;
  }

  .goto-label input {
    background: var(--bg); border: 1px solid var(--border-input);
    color: var(--text-input); font-family: inherit; font-size: 16px;
    padding: 8px 7px; width: 100%; outline: none;
    transition: border-color 0.15s, background 0.15s;
  }

  .goto-label input:focus { border-color: var(--border-focus); }

  .goto-actions { gap: 8px; }
  .goto-actions button { min-height: 38px; }

  #goto-paste.flash-ok  { border-color: var(--text-ok);  color: var(--text-ok); opacity: 1; }
  #goto-paste.flash-err { border-color: var(--text-err); color: var(--text-err); opacity: 1; }

  #goto-hint { font-size: 10px; color: var(--text-status); line-height: 1.5; }
  #goto-hint code { color: var(--text-label); background: var(--bg); padding: 1px 4px; font-family: inherit; }
  #goto-hint em { font-style: normal; color: var(--text-label); }
  #goto-err { font-size: 11px; color: var(--text-err); }
  #goto-err[hidden] { display: none; }

  @media (max-width: 768px) {
    :root {
      --ruler-size: 20;
      --toolbar-gap: 8px;
      --toolbar-px: 10px;
      --btn-size: 34px;
    }
    #toolbar label { flex: 1 1 120px; min-width: 0; }
    #toolbar input, #toolbar select { width: 100%; }
    #toolbar select { width: 100%; }
    #pack-name { width: 100% !important; }
    #download { flex: 1 1 100%; width: 100%; margin-left: 0; padding: 10px 12px; }
    #status { font-size: 12px; }
    button { font-size: 15px; }
    #goto-panel { min-width: 260px; }
    #coords { font-size: 10px; padding: 3px 6px; }
    #legend { font-size: 10px; padding: 4px 6px; bottom: 6px; }
  }

  @media (max-width: 480px) {
    :root {
      --ruler-size: 16;
      --toolbar-gap: 6px;
      --toolbar-px: 8px;
      --btn-size: 36px;
    }
    #toolbar input, #toolbar select { padding: 7px 8px; font-size: 14px; height: 36px; }
    button { font-size: 16px; border-radius: 4px; }
    #status { font-size: 11px; min-height: 20px; }
    #goto-panel {
      min-width: 0;
      width: calc(100vw - 16px);
      left: 8px !important;
      top: auto !important;
      bottom: calc(12px + env(safe-area-inset-bottom, 0px)) !important;
      max-height: 50vh;
      overflow-y: auto;
    }
    #goto-panel .goto-row { gap: 8px; }
    .goto-label input { font-size: 16px; }
    .goto-actions button { flex: 1; min-height: 40px; }
    #coords { font-size: 9px; padding: 2px 5px; }
    #legend { font-size: 9px; line-height: 1.6; }
    #legend div { white-space: nowrap; }
  }

  @media (max-width: 360px) {
    :root {
      --toolbar-px: 6px;
      --toolbar-gap: 4px;
    }
    #toolbar input, #toolbar select { padding: 6px; font-size: 13px; height: 32px; }
    button { min-width: 32px; height: 32px; font-size: 14px; }
    #goto-panel { width: calc(100vw - 8px); left: 4px !important; }
  }
</style>
</head>
<body>

<div id="toolbar">
  <button id="theme-toggle" class="btn-icon" title="Toggle light / dark">☽</button>
  <button id="biome-toggle" class="btn-icon" type="button" role="switch" aria-checked="true" title="Toggle Biome Overlay" style="color: var(--toggle-on); border-color: var(--toggle-on);">▩</button>
  <button id="goto-btn" class="btn-icon" type="button" title="Pan to coordinates" aria-expanded="false">
    <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <circle cx="7.5" cy="7.5" r="2.5"/><line x1="7.5" y1="1" x2="7.5" y2="4.5"/><line x1="7.5" y1="10.5" x2="7.5" y2="14"/><line x1="1" y1="7.5" x2="4.5" y2="7.5"/><line x1="10.5" y1="7.5" x2="14" y2="7.5"/>
    </svg>
  </button>
  <button id="clear-selection" class="btn-icon" type="button" title="Clear selection" disabled>
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 6h18"></path>
      <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
      <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
    </svg>
  </button>
  <label>Version
    <select id="ver">
      <option>26.20</option><option>1.21.60</option><option>1.21.50</option>
      <option>1.21.0</option><option>1.20.0</option><option>1.19.0</option>
      <option>1.18.0</option><option>1.17.30</option><option>1.17.0</option>
      <option>1.16.0</option>
    </select>
  </label>
  <label>Seed
    <input id="seed" value="0" placeholder="seed">
  </label>
  <label>Pack Name
    <input id="pack-name" value="Fortress HSS Viewer">
  </label>
  <button id="download">Download</button>
</div>

<div id="status">ready — loading wasm…</div>

<div id="main">
  <div id="goto-panel" hidden>
    <div class="goto-row">
      <label class="goto-label">X<input id="goto-x" type="number" placeholder="0" step="1"></label>
      <label class="goto-label">Z<input id="goto-z" type="number" placeholder="0" step="1"></label>
    </div>
    <div class="goto-row goto-actions">
      <button id="goto-paste" type="button">⧉ Paste XYZ</button>
      <button id="goto-go" type="button">Go ↗</button>
    </div>
    <div id="goto-hint">Paste format: <em>x y z</em> — e.g. <code>-151.41 65.80 -15.56</code></div>
    <div id="goto-err" hidden></div>
  </div>
  <div id="viewport">
    <canvas id="c"></canvas>
    <div id="coords"></div>
    <div id="legend">
      <div><span style="background:#3a6b8a"></span>Spawn Spots</div>
      <div><span style="background:#dc3232"></span>Nether Fortress</div>
      <div><span style="border:2px solid var(--select)"></span>Selected Fortress</div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="pack-generator.js"></script>
<script src="index.js"></script>
</body>
</html>
